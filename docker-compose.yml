services:
  etcd:
    image: ${ETCD_IMAGE:-quay.io/coreos/etcd:v3.5.15}
    container_name: linkgo-etcd
    command:
      - /usr/local/bin/etcd
      - --name=etcd0
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
    ports:
      - "2379:2379"

  zookeeper:
    image: ${ZOOKEEPER_IMAGE:-confluentinc/cp-zookeeper:7.6.0}
    container_name: linkgo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: ${KAFKA_IMAGE:-confluentinc/cp-kafka:7.6.0}
    container_name: linkgo-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: linkgo-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass 123456

  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0}
    container_name: linkgo-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=linkgo_im
      - MARIADB_ROOT_PASSWORD=root
      - MARIADB_DATABASE=linkgo_im
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      timeout: 20s
      retries: 10

  logic:
    build:
      context: .
      args:
        GO_BUILDER_IMAGE: ${GO_BUILDER_IMAGE:-golang:1.25-alpine}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-alpine:3.22}
    container_name: linkgo-logic
    command: ./logic
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      etcd:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=123456
      - DB_DSN=root:root@tcp(mysql:3306)/linkgo_im?charset=utf8mb4&parseTime=True&loc=Local
      - DB_MAX_OPEN_CONNS=100
      - DB_MAX_IDLE_CONNS=20
      - SERVICE_ADDR=logic:9001
      - ETCD_ENDPOINTS=etcd:2379
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_GROUP_TOPIC=group_message_dispatch
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - AI_MODEL=${AI_MODEL:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-10}
      - AI_FALLBACK_TO_MOCK=${AI_FALLBACK_TO_MOCK:-true}
      - AI_BOT_USER_ID=${AI_BOT_USER_ID:-9001}

  transfer:
    build:
      context: .
      args:
        GO_BUILDER_IMAGE: ${GO_BUILDER_IMAGE:-golang:1.25-alpine}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-alpine:3.22}
    container_name: linkgo-transfer
    command: ./transfer
    ports:
      - "9102:9102"
    depends_on:
      - redis
      - kafka
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=123456
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_GROUP_TOPIC=group_message_dispatch
      - KAFKA_RETRY_TOPIC=group_message_retry
      - KAFKA_DLQ_TOPIC=group_message_dlq
      - KAFKA_CONSUMER_GROUP=transfer-group
      - TRANSFER_METRICS_PORT=9102
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9102/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  gateway-a:
    build:
      context: .
      args:
        GO_BUILDER_IMAGE: ${GO_BUILDER_IMAGE:-golang:1.25-alpine}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-alpine:3.22}
    container_name: linkgo-gateway-a
    command: ./gateway
    ports:
      - "8090:8090"
    depends_on:
      - logic
      - redis
      - etcd
    environment:
      - GATEWAY_PORT=8090
      - GATEWAY_ID=gateway-a
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=123456
      - DB_DSN=root:root@tcp(mysql:3306)/linkgo_im?charset=utf8mb4&parseTime=True&loc=Local
      - DB_MAX_OPEN_CONNS=80
      - DB_MAX_IDLE_CONNS=20
      - ETCD_ENDPOINTS=etcd:2379
      - LOGIC_ADDR=logic:9001
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - AI_MODEL=${AI_MODEL:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-10}
      - AI_FALLBACK_TO_MOCK=${AI_FALLBACK_TO_MOCK:-true}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  gateway-b:
    build:
      context: .
      args:
        GO_BUILDER_IMAGE: ${GO_BUILDER_IMAGE:-golang:1.25-alpine}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-alpine:3.22}
    container_name: linkgo-gateway-b
    command: ./gateway
    ports:
      - "8091:8090"
    depends_on:
      - logic
      - redis
      - etcd
    environment:
      - GATEWAY_PORT=8090
      - GATEWAY_ID=gateway-b
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=123456
      - DB_DSN=root:root@tcp(mysql:3306)/linkgo_im?charset=utf8mb4&parseTime=True&loc=Local
      - DB_MAX_OPEN_CONNS=80
      - DB_MAX_IDLE_CONNS=20
      - ETCD_ENDPOINTS=etcd:2379
      - LOGIC_ADDR=logic:9001
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - AI_MODEL=${AI_MODEL:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-10}
      - AI_FALLBACK_TO_MOCK=${AI_FALLBACK_TO_MOCK:-true}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  gateway-c:
    build:
      context: .
      args:
        GO_BUILDER_IMAGE: ${GO_BUILDER_IMAGE:-golang:1.25-alpine}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-alpine:3.22}
    container_name: linkgo-gateway-c
    command: ./gateway
    ports:
      - "8092:8090"
    depends_on:
      - logic
      - redis
      - etcd
    environment:
      - GATEWAY_PORT=8090
      - GATEWAY_ID=gateway-c
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=123456
      - DB_DSN=root:root@tcp(mysql:3306)/linkgo_im?charset=utf8mb4&parseTime=True&loc=Local
      - DB_MAX_OPEN_CONNS=80
      - DB_MAX_IDLE_CONNS=20
      - ETCD_ENDPOINTS=etcd:2379
      - LOGIC_ADDR=logic:9001
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - AI_MODEL=${AI_MODEL:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - AI_TIMEOUT_SECONDS=${AI_TIMEOUT_SECONDS:-10}
      - AI_FALLBACK_TO_MOCK=${AI_FALLBACK_TO_MOCK:-true}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
