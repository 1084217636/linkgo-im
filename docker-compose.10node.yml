services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    container_name: linkgo-etcd
    command:
      - /usr/local/bin/etcd
      - --name=etcd0
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: linkgo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: linkgo-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  redis:
    image: redis:7-alpine
    container_name: linkgo-redis
    command: redis-server --requirepass 123456

  mysql:
    image: mysql:8.0
    container_name: linkgo-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=linkgo_im
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  logic:
    build: .
    container_name: linkgo-logic
    command: ./logic
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      etcd:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=123456
      - DB_DSN=root:root@tcp(mysql:3306)/linkgo_im?charset=utf8mb4&parseTime=True&loc=Local
      - SERVICE_ADDR=logic:9001
      - ETCD_ENDPOINTS=etcd:2379
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_GROUP_TOPIC=group_message_dispatch

  transfer:
    build: .
    container_name: linkgo-transfer
    command: ./transfer
    depends_on:
      - redis
      - kafka
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=123456
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_GROUP_TOPIC=group_message_dispatch
      - KAFKA_RETRY_TOPIC=group_message_retry
      - KAFKA_DLQ_TOPIC=group_message_dlq
      - KAFKA_CONSUMER_GROUP=transfer-group
      - TRANSFER_METRICS_PORT=9102

  gateway-a:
    build: .
    container_name: linkgo-gateway-a
    command: ./gateway
    ports:
      - "8090:8090"
    depends_on:
      - logic
      - redis
      - etcd
    environment:
      - GATEWAY_PORT=8090
      - GATEWAY_ID=gateway-a
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=123456
      - ETCD_ENDPOINTS=etcd:2379

