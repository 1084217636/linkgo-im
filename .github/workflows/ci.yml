name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-build:
    name: Go test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build services
        run: |
          go build -o bin/gateway ./cmd/gateway
          go build -o bin/logic ./cmd/logic
          go build -o bin/transfer ./cmd/transfer

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: linkgo-im:${{ github.sha }}

  manifest-check:
    name: Kubernetes manifest check
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check manifest files exist
        run: |
          test -f deploy/k8s/namespace.yaml
          test -f deploy/k8s/configmap.yaml
          test -f deploy/k8s/secret.yaml
          test -f deploy/k8s/gateway.yaml
          test -f deploy/k8s/logic.yaml
          test -f deploy/k8s/transfer.yaml
          grep -R "kind:" deploy/k8s
