name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    name: Go test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Run tests
        run: make test

      - name: Build services
        run: make build

      - name: Validate Docker Compose config
        run: |
          make compose-config
          make compose-cn-config
          make compose-light-config
          make compose-light-cn-config
          make observability-config
          make observability-cn-config

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: linkgo-im:${{ github.sha }}
          build-args: |
            GO_BUILDER_IMAGE=golang:1.25-alpine
            RUNTIME_IMAGE=alpine:3.22

  manifest-check:
    name: Kubernetes manifest render
    runs-on: ubuntu-latest
    needs: test-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Render manifests
        run: |
          kubectl kustomize deploy/k8s --load-restrictor LoadRestrictionsNone > /tmp/linkgo-im-k8s.yaml
          grep -q "kind: Deployment" /tmp/linkgo-im-k8s.yaml
          grep -q "kind: HorizontalPodAutoscaler" /tmp/linkgo-im-k8s.yaml
          grep -q "kind: NetworkPolicy" /tmp/linkgo-im-k8s.yaml
