syntax = "proto3";
package api;
option go_package = "./api";

// 定义消息类型枚举
enum MsgType {
    NORMAL = 0;    // 普通消息
    HEARTBEAT = 1; // 心跳包
}

// --- Logic 服务接口 ---
message PushMsgReq {
    string user_id = 1; // 谁发的
    bytes  content = 2; // 原始内容
}
message PushMsgReply {}

message UserLoginReq {
    string user_id = 1;
}
message UserLoginReply {}

// 【新增】获取历史消息请求
message GetHistoryReq {
    string user_id = 1;   // 当前用户ID
    string target_id = 2; // 目标ID（用户ID或群ID）
}

// 【新增】获取历史消息响应
message GetHistoryReply {
    repeated string messages = 1; // 返回的消息列表
}

service Logic {
    //用户登录
    rpc Login (LoginReq) returns (LoginReply);
    // 处理上行消息
    rpc PushMessage (PushMsgReq) returns (PushMsgReply);
    // 用户上线通知
    rpc UserLogin (UserLoginReq) returns (UserLoginReply);
    // 【新增】拉取历史记录接口
    rpc GetHistory (GetHistoryReq) returns (GetHistoryReply);
}

// 增加这两个结构
message LoginReq {
    string username = 1;
    string password = 2;
}

message LoginReply {
    string token = 1;
    string user_id = 2;
}

// --- Gateway 服务接口 ---
message SendToUserReq {
    string target_user_id = 1; 
    bytes  content = 2;        
}

message SendToUserReply {
    bool success = 1; 
}

service Gateway {
    rpc PushToUser (SendToUserReq) returns (SendToUserReply);
}