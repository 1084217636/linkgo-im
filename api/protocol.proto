syntax = "proto3";

package api;

option go_package = "./api";

enum MsgType {
    NORMAL = 0;
    HEARTBEAT = 1;
    ACK = 2;
    SYSTEM = 3;
}

message WireMessage {
    string message_id = 1;
    string session_id = 2;
    int64 seq = 3;
    string from = 4;
    string to = 5;
    string to_type = 6;
    MsgType msg_type = 7;
    string body = 8;
    int64 sent_at = 9;
    string ack_message_id = 10;
    string client_msg_id = 11;
    string trace_id = 12;
    int64 last_seq = 13;
}

message PushMsgReq {
    string user_id = 1;
    bytes content = 2;
}

message PushMsgReply {}

message UserLoginReq {
    string user_id = 1;
}

message UserLoginReply {}

message GetHistoryReq {
    string user_id = 1;
    string target_id = 2;
}

message GetHistoryReply {
    repeated WireMessage messages = 1;
}

service Logic {
    rpc Login (LoginReq) returns (LoginReply);
    rpc PushMessage (PushMsgReq) returns (PushMsgReply);
    rpc UserLogin (UserLoginReq) returns (UserLoginReply);
    rpc GetHistory (GetHistoryReq) returns (GetHistoryReply);
}

message LoginReq {
    string username = 1;
    string password = 2;
}

message LoginReply {
    string token = 1;
    string user_id = 2;
    repeated Conversation conversations = 3;
}

message Conversation {
    string conversation_id = 1;
    string type = 2;
    string title = 3;
    string last_msg = 4;
    int64 last_seq = 5;
    int64 read_seq = 6;
    int64 unread_count = 7;
    int64 updated_at = 8;
}

message SendToUserReq {
    string target_user_id = 1;
    bytes content = 2;
}

message SendToUserReply {
    bool success = 1;
}

service Gateway {
    rpc PushToUser (SendToUserReq) returns (SendToUserReply);
}
