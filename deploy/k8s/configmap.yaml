apiVersion: v1
kind: ConfigMap
metadata:
  name: linkgo-im-config
  namespace: linkgo-im
data:
  REDIS_ADDR: redis.linkgo-im.svc.cluster.local:6379
  ETCD_ENDPOINTS: etcd.linkgo-im.svc.cluster.local:2379
  # LOGIC_ADDR is intentionally omitted: gateways discover every Logic pod
  # through Etcd and use the p2c_ewma client-side balancer.
  KAFKA_BROKERS: kafka.linkgo-im.svc.cluster.local:9092
  KAFKA_GROUP_TOPIC: group_message_dispatch
  KAFKA_RETRY_TOPIC: group_message_retry
  KAFKA_DLQ_TOPIC: group_message_dlq
  KAFKA_CONSUMER_GROUP: transfer-group
  ROUTE_TTL_SECONDS: "75"
  ACK_TIMEOUT_SECONDS: "5"
  ACK_MAX_RETRIES: "3"
  RETRY_INTERVAL_SECONDS: "1"
  TRANSFER_METRICS_PORT: "9102"
