apiVersion: v1
kind: Service
metadata:
  name: logic
  namespace: linkgo-im
  labels:
    app: logic
spec:
  selector:
    app: logic
  ports:
    - name: grpc
      port: 9001
      targetPort: grpc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logic
  namespace: linkgo-im
  labels:
    app: logic
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: logic
  template:
    metadata:
      labels:
        app: logic
    spec:
      serviceAccountName: linkgo-im
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: logic
      containers:
        - name: logic
          image: linkgo-im:local
          imagePullPolicy: IfNotPresent
          command: ["./logic"]
          ports:
            - name: grpc
              containerPort: 9001
          env:
            - name: RPC_PORT
              value: "9001"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          envFrom:
            - configMapRef:
                name: linkgo-im-config
            - secretRef:
                name: linkgo-im-secret
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: logic
  namespace: linkgo-im
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: logic
