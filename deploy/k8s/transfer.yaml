apiVersion: v1
kind: Service
metadata:
  name: transfer
  namespace: linkgo-im
  labels:
    app: transfer
spec:
  selector:
    app: transfer
  ports:
    - name: metrics
      port: 9102
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transfer
  namespace: linkgo-im
  labels:
    app: transfer
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: transfer
  template:
    metadata:
      labels:
        app: transfer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "9102"
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: transfer
          image: linkgo-im:local
          imagePullPolicy: IfNotPresent
          command: ["./transfer"]
          ports:
            - name: metrics
              containerPort: 9102
          envFrom:
            - configMapRef:
                name: linkgo-im-config
            - secretRef:
                name: linkgo-im-secret
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
