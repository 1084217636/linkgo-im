apiVersion: v1
kind: ConfigMap
metadata:
  name: linkgo-im-config
  namespace: linkgo-im
data:
  # Stable HA endpoints. Replace example.internal with a managed-service,
  # proxy/VIP, or platform service-discovery address before applying.
  REDIS_ADDR: redis-ha.example.internal:6379
  ETCD_ENDPOINTS: etcd-1.example.internal:2379,etcd-2.example.internal:2379,etcd-3.example.internal:2379
  KAFKA_BROKERS: kafka-1.example.internal:9092,kafka-2.example.internal:9092,kafka-3.example.internal:9092
  KAFKA_GROUP_TOPIC: group_message_dispatch
  KAFKA_RETRY_TOPIC: group_message_retry
  KAFKA_DLQ_TOPIC: group_message_dlq
  KAFKA_CONSUMER_GROUP: transfer-group
  ROUTE_TTL_SECONDS: "75"
  ACK_TIMEOUT_SECONDS: "5"
  ACK_MAX_RETRIES: "3"
  RETRY_INTERVAL_SECONDS: "1"
  TRANSFER_METRICS_PORT: "9102"
  DB_MAX_OPEN_CONNS: "80"
  DB_MAX_IDLE_CONNS: "20"
  DB_CONN_MAX_LIFETIME_SECONDS: "300"
  DB_CONN_MAX_IDLE_TIME_SECONDS: "60"
