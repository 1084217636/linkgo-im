apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - rbac.yaml
  - dependencies.yaml
  - gateway.yaml
  - logic.yaml
  - transfer.yaml
  - hpa.yaml
  - networkpolicy.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: linkgo-im-mysql-init
    namespace: linkgo-im
    files:
      - init.sql=../../sql/init.sql
