Name: logic.rpc
ListenOn: 0.0.0.0:9001
Etcd:
  Hosts:
    - etcd:2379
  Key: /services/logic

Cache:
  Addr: redis:6379
  Password: "123456"

Database:
  Dsn: root:root@tcp(mysql:3306)/linkgo_im?charset=utf8mb4&parseTime=True&loc=Local
  MaxOpenConns: 100
  MaxIdleConns: 20
  ConnMaxLifetimeSeconds: 300
  ConnMaxIdleTimeSeconds: 60

Kafka:
  Brokers:
    - kafka:9092
  GroupTopic: group_message_dispatch

JWT:
  AccessSecret: linkgo_im_secret_2026

AI:
  Provider: mock
  Model: mock-summary-v1
  BaseURL:
  APIKey:
  TimeoutSeconds: 10
  FallbackToMock: true
  KnowledgePaths:
    - docs/AI_FAQ.md
    - README.md
    - docs/CODE_MAP.md
    - docs/CORE_LINKS.md
    - docs/INTERVIEW_QA.md
  KnowledgeTopK: 3
  BotUserID: "9001"
