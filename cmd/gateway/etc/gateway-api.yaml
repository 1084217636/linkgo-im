Name: gateway-api
Host: 0.0.0.0
Port: 8090

Redis:
  Addr: redis:6379
  Password: "123456"

Database:
  Dsn: root:root@tcp(mysql:3306)/linkgo_im?charset=utf8mb4&parseTime=True&loc=Local
  MaxOpenConns: 80
  MaxIdleConns: 20
  ConnMaxLifetimeSeconds: 300
  ConnMaxIdleTimeSeconds: 60

Etcd:
  Endpoints:
    - etcd:2379

Logic:
  Addr: ""

Gateway:
  ID: gateway-a
  RouteTTLSeconds: 75
  AckTimeoutSeconds: 5
  AckMaxRetries: 3
  RetryIntervalSeconds: 1

Auth:
  AccessSecret: linkgo_im_secret_2026

AI:
  Provider: mock
  Model: mock-summary-v1
  BaseURL:
  APIKey:
  TimeoutSeconds: 10
  MaxMessages: 100
  FallbackToMock: true
  KnowledgePaths:
    - docs/AI_FAQ.md
    - README.md
    - docs/CODE_MAP.md
    - docs/CORE_LINKS.md
    - docs/INTERVIEW_QA.md
  KnowledgeTopK: 3
